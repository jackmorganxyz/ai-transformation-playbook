name: Site or validation bug
description: Report a repo, docs, CI, or publishing bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Broken link in the task scoring rubric page
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the command, page, or workflow that fails.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
