name: Content gap
description: Track approved gaps in examples, guides, or reference patterns.
title: "[Content Gap]: "
labels:
  - content
body:
  - type: dropdown
    id: contribution_type
    attributes:
      label: Contribution type
      options:
        - Agent example
        - Vertical or role guide
        - Reference pattern
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: Missing workflow or audience
      description: Which workflow, role, or vertical is currently underspecified?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Source material
      description: Link any reference material that can anchor the contribution.
    validations:
      required: true
  - type: textarea
    id: review_notes
    attributes:
      label: Reviewer expectations
      description: State the quality bar and any known compliance or approval constraints.
    validations:
      required: true
